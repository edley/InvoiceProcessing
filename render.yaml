services:
  - type: web
    name: tolmai-invoice-backend
    runtime: python
    repo: https://github.com/edley/InvoiceProcessing.git
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SUPABASE_URL
        fromDashboard: true
      - key: SUPABASE_SERVICE_KEY
        fromDashboard: true
      - key: SUPABASE_ANON_KEY
        fromDashboard: true
      - key: DATABASE_URL
        fromDashboard: true
      - key: LLM_PROVIDER
        fromDashboard: true
      - key: NVIDIA_API_KEY
        fromDashboard: true
      - key: CORS_ORIGINS
        fromDashboard: true
